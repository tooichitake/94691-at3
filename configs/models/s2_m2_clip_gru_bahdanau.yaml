run_name: s2_m2_clip_gru_bahdanau

data:
  data_config: configs/data_config.yaml
  transform_preset: clip_224

model:
  encoder:
    name: clip_vision
    pretrained: openai/clip-vit-base-patch16
    freeze: true
    unfreeze_last_transformer_layers: 2
  decoder:
    name: gru_attn
    attention: bahdanau
    embed_dim: 512
    hidden_dim: 512
    attn_dim: 512
    n_layers: 1
    dropout: 0.3

training:
  batch_size: 64                         # increased from 32
  epochs: 12                             # reduced from 20
  optimizer: adamw
  lr: 1.0e-4
  betas: [0.9, 0.98]
  weight_decay: 0.01
  warmup_steps: 500                      # reduced from 1000 to match shorter training
  encoder_lr_scale: 0.05
  encoder_lr_decay: 0.65
  scheduler: cosine
  clip_norm: 1.0
  label_smoothing: 0.1
  amp: true
  early_stop_patience: false
  monitor: cider

eval:
  beam_size: 5
  max_gen_len: 52
  length_penalty: 1.0

grpo:
  enabled: true
  epochs: 3                              # reduced from 5
  lr: 1.0e-5
  weight_decay: 0.0
  group_size: 5
  clip_eps: 0.2
  kl_beta: 0.04
  clip_norm: 1.0
  reward: cider
